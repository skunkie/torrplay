name: Build and Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-client:
    name: Build Client
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10
      - name: Update version in package.json
        run: |
          VERSION="${GITHUB_REF_NAME:1}"
          jq --arg ver "$VERSION" '.version = $ver' package.json > tmp.json && mv tmp.json package.json
        shell: bash
        working-directory: ./client
      - name: Build Client
        run: |
          pnpm install --frozen-lockfile
          pnpm build
        shell: bash
        working-directory: ./client
      - name: Upload client artifacts
        uses: actions/upload-artifact@v7
        with:
          name: client-artifacts
          path: ./client/out

  build-android-library:
    name: Build Android Library
    needs: build-client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Download client artifacts
        uses: actions/download-artifact@v8
        with:
          name: client-artifacts
          path: ./web/static
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - name: Build Android Library
        run: |
          mkdir -p ./out
          BUILD_DATE=$(date +%F)
          COMMIT=$(git rev-parse --short=7 HEAD)
          VERSION="${GITHUB_REF_NAME:1}"
          MODULE=github.com/torrplay/torrplay
          LDFLAGS="-X '${MODULE}/internal/buildinfo.BuildDate=${BUILD_DATE}' -X '${MODULE}/internal/buildinfo.Commit=${COMMIT}' -X '${MODULE}/internal/buildinfo.Version=${VERSION}'"
          go install golang.org/x/mobile/cmd/gomobile@latest && gomobile init
          go get golang.org/x/mobile/bind
          CGO_LDFLAGS="-static-libstdc++" gomobile bind \
            -target=android \
            -androidapi 24 \
            -ldflags="-s -w -checklinkname=0 ${LDFLAGS}" \
            -trimpath \
            -o ./out/torrplay.aar \
            ./pkg/torrplay
        shell: bash
      - name: Upload Android Library artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-artifacts-android-library
          path: ./out/*

  build-application:
    name: Build Application
    needs: build-client
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Download client artifacts
        uses: actions/download-artifact@v8
        with:
          name: client-artifacts
          path: ./web/static
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - name: Install go-winres
        run: go install github.com/tc-hib/go-winres@v0.3.3
        shell: bash
      - name: Build Application
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          BUILD_DATE=$(date +%F)
          COMMIT=$(git rev-parse --short=7 HEAD)
          VERSION="${GITHUB_REF_NAME:1}"
          MODULE=github.com/torrplay/torrplay
          LDFLAGS="-X '${MODULE}/internal/buildinfo.BuildDate=${BUILD_DATE}' -X '${MODULE}/internal/buildinfo.Commit=${COMMIT}' -X '${MODULE}/internal/buildinfo.Version=${VERSION}'"
          OUTPUT_NAME=torrplay-${{ matrix.goos }}-${{ matrix.goarch }}
          if [ "${{ matrix.goos }}" = "windows" ]; then
            OUTPUT_NAME=${OUTPUT_NAME}.exe
            $(go env GOPATH)/bin/go-winres make --arch ${{ matrix.goarch }} --in ./winres/winres.json --out ./cmd/torrplay/rsrc --product-version=${VERSION} --file-version=${VERSION}
          fi
          go build -buildvcs=false -ldflags="-s -w ${LDFLAGS}" -trimpath -o ./bin/$OUTPUT_NAME ./cmd/torrplay
        shell: bash
      - name: Upload Release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-artifacts-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ./bin/*

  build-packages:
    name: Build Packages
    needs: build-application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Download all release artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts
          pattern: release-artifacts-*
          merge-multiple: true
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - name: Install dependencies for GoReleaser
        run: sudo apt-get install -y fakeroot mkisofs
        shell: bash
      - name: Create dummy Go file
        run: echo 'package main; func main() {}' > dummy.go
        shell: bash
      - name: Validate GoReleaser config
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: check
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --skip=validate,publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload GoReleaser artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-artifacts-build-packages
          path: |
            dist/*.deb
            dist/*.rpm

  build-tauri:
    name: Build Tauri Application
    needs: build-application
    strategy:
      fail-fast: false
      matrix:
        platform: [ macos-latest, ubuntu-latest, windows-latest ]
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Download macOS arm64 artifact
        if: matrix.platform == 'macos-latest'
        uses: actions/download-artifact@v8
        with:
          path: ./client/src-tauri/binaries
          pattern: release-artifacts-darwin-arm64
      - name: Rename macOS arm64 artifact
        if: matrix.platform == 'macos-latest'
        run: |
          mv torrplay-darwin-arm64 torrplay-aarch64-apple-darwin
          chmod +x torrplay-aarch64-apple-darwin
        shell: bash
        working-directory: ./client/src-tauri/binaries
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
        shell: bash
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        shell: bash
        working-directory: ./client
      - name: Update version in all config files
        run: |
          VERSION="${GITHUB_REF_NAME:1}"
          jq --arg ver "$VERSION" '.version = $ver' package.json > tmp.json && mv tmp.json package.json
          jq --arg ver "$VERSION" '.version = $ver' src-tauri/tauri.conf.json > tmp.json && mv tmp.json src-tauri/tauri.conf.json
          sed -i.bak 's/^version\s*=\s*".*"/version = "'"$VERSION"'"/' src-tauri/Cargo.toml
          rm -f src-tauri/Cargo.toml.bak
        shell: bash
        working-directory: ./client
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: ./client
      - name: Upload Tauri artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-artifacts-tauri-${{ matrix.platform }}
          path: |
            ./client/src-tauri/target/release/bundle/deb/*.deb
            ./client/src-tauri/target/release/bundle/rpm/*.rpm
            ./client/src-tauri/target/release/bundle/appimage/*.AppImage
            ./client/src-tauri/target/release/bundle/msi/*.msi
            ./client/src-tauri/target/release/bundle/nsis/*.exe
            ./client/src-tauri/target/release/bundle/dmg/*.dmg
  build-msi:
    name: Build MSI
    needs: build-application
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Download application artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-artifacts-windows-*
          merge-multiple: true
          path: ./bin
      - name: Install WiX and required extensions
        run: |
          dotnet tool install --global wix
          wix extension add WixToolset.Firewall.wixext -acceptEula wix7
          wix extension add WixToolset.UI.wixext -acceptEula wix7
          wix extension add WixToolset.Util.wixext -acceptEula wix7
        shell: pwsh
      - name: Build MSI
        run: |
          $VERSION = "${{ github.ref_name }}".Substring(1)

          wix build -arch x64 `
            -ext WixToolset.Firewall.wixext `
            -ext WixToolset.UI.wixext `
            -ext WixToolset.Util.wixext `
            -d ServiceFile=./bin/torrplay-windows-amd64.exe `
            -d LicenseFile=./LICENSE `
            -d Version="$VERSION" `
            -out "./bin/TorrPlay-${VERSION}-x64.msi" ./wix/installer.wxs -acceptEula wix7

          wix build -arch arm64 `
            -ext WixToolset.Firewall.wixext `
            -ext WixToolset.UI.wixext `
            -ext WixToolset.Util.wixext `
            -d ServiceFile=./bin/torrplay-windows-arm64.exe `
            -d LicenseFile=./LICENSE `
            -d Version="$VERSION" `
            -out "./bin/TorrPlay-${VERSION}-arm64.msi" ./wix/installer.wxs -acceptEula wix7
        shell: pwsh
      - name: Upload MSI Assets
        uses: actions/upload-artifact@v7
        with:
          name: release-artifacts-msi
          path: ./bin/*.msi

  build-android:
    name: Build Android
    needs: [ build-client, build-android-library ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
      - name: Download Client artifacts
        uses: actions/download-artifact@v8
        with:
          name: client-artifacts
          path: ./client/out
      - name: Install client dependencies and Sync Capacitor
        run: |
          pnpm install --frozen-lockfile
          npx cap sync android
        shell: bash
        working-directory: ./client
      - name: Download Android Library artifacts
        uses: actions/download-artifact@v8
        with:
          name: release-artifacts-android-library
          path: ./client/android/app/libs/
      - name: Decode signing key
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
        run: echo "$SIGNING_KEY_BASE64" | base64 -d > ${{ runner.temp }}/keystore.jks
        shell: bash
      - name: Build Android Release
        env:
          STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          mkdir -p ./out
          cd ./android

          VERSION="${GITHUB_REF_NAME:1}"
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3 | cut -d- -f1)
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))

          sed -i \
              -e "s/versionCode 1/versionCode ${VERSION_CODE}/g" \
              -e "s/versionName \"1.0\"/versionName \"${VERSION}\"/g" \
              ./app/build.gradle

          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=${{ runner.temp }}/keystore.jks \
            -Pandroid.injected.signing.store.password=$STORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

          for apk in ./app/build/outputs/apk/release/*.apk; do
            arch=$(basename "$apk" | sed -E 's/.*-(armeabi-v7a|arm64-v8a|x86|x86_64|universal)-.*/\1/')
            basedir=$(dirname "$apk")
            if [ -n "$arch" ]; then
              mv "$apk" "${basedir}/torrplay-android-${arch}.apk"
            fi
          done
        shell: bash
        working-directory: ./client
      - name: Upload Release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-artifacts-android
          path: ./client/android/app/build/outputs/apk/release/*.apk

  create-release:
    name: Create GitHub Release
    needs:
      [
        build-android-library,
        build-android,
        build-application,
        build-msi,
        build-packages,
        build-tauri,
      ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all release artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts
          pattern: release-artifacts-*
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            release-artifacts/*
            release-artifacts/**/*
          name: ${{ github.ref_name }}
          generate_release_notes: true
          make_latest: true

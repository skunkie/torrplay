              type: integer
              description: File index.
              minimum: 0
              example: 0

    TSSettings:
      type: object
      description: TorrServer settings.
      properties:
        CacheSize:
          type: integer
          format: int64
          description: Maximum memory for cache in bytes.
          minimum: 1048576
          example: 1073741824

    TSViewedRequest:
